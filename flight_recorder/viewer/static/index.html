<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Flight Recorder</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #12151a;
    --border: #23282f;
    --text: #d7dbe0;
    --muted: #7a8290;
    --accent: #e8ebef;
    --info: #5b6472;
    --write: #4a8fe7;
    --exec: #d9a441;
    --network: #a06be0;
    --sensitive: #e5484d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: ui-monospace, SFMono-Regular, "Cascadia Code", Consolas, monospace; }
  #app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

  .topbar { display: flex; align-items: center; gap: 16px; padding: 10px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel); }
  .rec { color: var(--sensitive); font-weight: bold; }
  .rec.live::before { content: "●"; margin-right: 6px; animation: pulse 1.5s infinite; }
  .rec.idle { color: var(--muted); }
  .rec.idle::before { content: "○"; margin-right: 6px; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .brand { font-weight: bold; letter-spacing: 0.5px; }
  #search { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-family: inherit; }
  #search:focus { outline: 1px solid var(--write); }

  .body { display: grid; grid-template-columns: 220px 1fr; min-height: 0; }
  .sidebar { border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; }
  .sidebar h4 { color: var(--muted); font-size: 11px; text-transform: uppercase; margin: 12px 0 6px; }
  .session-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--muted); }
  .session-item:hover { background: var(--panel); }
  .session-item.active { background: var(--panel); color: var(--accent); }
  .filters label { display: block; font-size: 12px; color: var(--muted); padding: 3px 0; cursor: pointer; }

  .main { display: grid; grid-template-rows: 1fr auto; min-height: 0; }
  .timeline { overflow-y: auto; padding: 8px; }
  .row { display: flex; gap: 10px; padding: 8px 10px; border-radius: 4px; cursor: pointer;
    border: 1px solid transparent; align-items: baseline; }
  .row:hover, .row.selected { background: var(--panel); border-color: var(--border); }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; margin-top: 5px; }
  .dot.info { background: var(--info); }
  .dot.write { background: var(--write); }
  .dot.exec { background: var(--exec); }
  .dot.network { background: var(--network); }
  .dot.sensitive { background: var(--sensitive); box-shadow: 0 0 6px var(--sensitive); }
  .row-main { flex: 1; min-width: 0; }
  .row-head { display: flex; gap: 10px; font-size: 12px; }
  .row-time { color: var(--muted); }
  .tool-badge { color: var(--accent); font-weight: bold; }
  .summary { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .why-line { color: var(--muted); font-style: italic; font-size: 12px; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty { color: var(--muted); padding: 40px; line-height: 1.8; }
  .empty code { color: var(--accent); background: var(--panel); padding: 1px 5px; border-radius: 3px; }

  .drawer { border-top: 1px solid var(--border); background: var(--panel); max-height: 45vh;
    overflow-y: auto; display: none; }
  .drawer.open { display: block; }
  .drawer-tabs { display: flex; gap: 2px; padding: 8px 12px 0; border-bottom: 1px solid var(--border); }
  .drawer-tabs button { background: none; border: none; color: var(--muted); padding: 8px 12px;
    cursor: pointer; font-family: inherit; font-size: 12px; border-bottom: 2px solid transparent; }
  .drawer-tabs button.active { color: var(--accent); border-bottom-color: var(--write); }
  .drawer-body { padding: 14px; font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-bottom: 8px; }
  .badge.ok { background: #163a2a; color: #4ade80; }
  .badge.gap { background: #3a2a16; color: #e5a84d; }
  .gap-note { color: var(--exec); }

  .pause-pill { position: sticky; top: 0; text-align: center; padding: 6px; background: var(--write);
    color: #06131f; font-size: 12px; cursor: pointer; border-radius: 4px; margin-bottom: 6px; display: none; }
  .pause-pill.show { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="rec idle" id="rec-indicator">REC</span>
    <span class="brand">Flight Recorder</span>
    <input id="search" placeholder="search: tool:bash risk:sensitive file:deploy.yaml session:abc" />
  </div>
  <div class="body">
    <div class="sidebar">
      <div class="session-item active" data-session="">All sessions</div>
      <h4>Sessions</h4>
      <div id="session-list"></div>
      <h4>Filters</h4>
      <div class="filters" id="filters">
        <label><input type="checkbox" value="sensitive" checked> sensitive</label>
        <label><input type="checkbox" value="network" checked> network</label>
        <label><input type="checkbox" value="exec" checked> exec</label>
        <label><input type="checkbox" value="write" checked> write</label>
        <label><input type="checkbox" value="info" checked> info</label>
      </div>
    </div>
    <div class="main">
      <div class="timeline" id="timeline">
        <div class="pause-pill" id="pause-pill">⏸ paused — click to resume live</div>
        <div class="empty" id="empty-state">
          No events yet. To start recording:<br><br>
          1. <code>fr init</code> — register hooks in this project<br>
          2. Start a Claude Code session here<br>
          3. Watch actions stream in below
        </div>
      </div>
      <div class="drawer" id="drawer">
        <div class="drawer-tabs">
          <button data-tab="what" class="active">WHAT</button>
          <button data-tab="why">WHY</button>
          <button data-tab="context">CONTEXT</button>
          <button data-tab="result">RESULT</button>
        </div>
        <div class="drawer-body" id="drawer-body"></div>
      </div>
    </div>
  </div>
</div>
<script>
const state = { events: [], selected: null, sessionFilter: "", riskFilter: new Set(["sensitive","network","exec","write","info"]),
  paused: false, searchMode: false, tab: "what" };

const timelineEl = document.getElementById("timeline");
const emptyEl = document.getElementById("empty-state");
const pausePill = document.getElementById("pause-pill");
const drawer = document.getElementById("drawer");
const drawerBody = document.getElementById("drawer-body");
const recIndicator = document.getElementById("rec-indicator");

function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour12: false });
}

function summaryFor(ev) {
  try {
    const args = JSON.parse(ev.arguments_json || "{}");
    if (ev.tool === "Bash") return args.command || "";
    if (args.file_path) return args.file_path;
    if (args.pattern) return args.pattern;
    if (args.url) return args.url;
    return ev.arguments_json ? ev.arguments_json.slice(0, 120) : "";
  } catch { return (ev.arguments_json || "").slice(0, 120); }
}

function whyLine(ev) {
  if (ev.capture_gap) return "";
  if (!ev.reasoning_text) return "";
  return ev.reasoning_text.split("\n").find(l => l.trim()) || "";
}

function rowHtml(ev) {
  const why = whyLine(ev);
  return `<div class="row" data-id="${ev.id}">
    <div class="dot ${ev.risk}"></div>
    <div class="row-main">
      <div class="row-head">
        <span class="row-time">${fmtTime(ev.ts)}</span>
        <span class="tool-badge">${ev.tool || ev.phase}</span>
        <span class="summary">${escapeHtml(summaryFor(ev))}</span>
      </div>
      ${why ? `<div class="why-line">↳ why: ${escapeHtml(why)}</div>` : ""}
    </div>
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function passesFilter(ev) {
  if (state.sessionFilter && ev.session_id !== state.sessionFilter) return false;
  if (!state.riskFilter.has(ev.risk)) return false;
  return true;
}

function render() {
  const visible = state.events.filter(passesFilter);
  emptyEl.style.display = visible.length ? "none" : "block";
  const rows = visible.slice().sort((a,b) => b.ts - a.ts).map(rowHtml).join("");
  const pill = timelineEl.querySelector("#pause-pill");
  timelineEl.innerHTML = "";
  timelineEl.appendChild(pausePill);
  timelineEl.insertAdjacentHTML("beforeend", rows || "");
  if (!visible.length) timelineEl.appendChild(emptyEl);
  timelineEl.querySelectorAll(".row").forEach(r => {
    r.addEventListener("click", () => selectEvent(parseInt(r.dataset.id)));
    if (state.selected && parseInt(r.dataset.id) === state.selected.id) r.classList.add("selected");
  });
}

async function selectEvent(id) {
  const res = await fetch(`/api/events/${id}`);
  state.selected = await res.json();
  drawer.classList.add("open");
  renderDrawer();
  render();
}

function renderDrawer() {
  const ev = state.selected;
  if (!ev) return;
  document.querySelectorAll(".drawer-tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === state.tab));
  let html = "";
  if (state.tab === "what") {
    let args = ev.arguments_json;
    try { args = JSON.stringify(JSON.parse(ev.arguments_json), null, 2); } catch {}
    html = `<div class="badge ok">${ev.tool || ev.phase}</div>\n${escapeHtml(args || "(none)")}`;
  } else if (state.tab === "why") {
    if (ev.capture_gap) {
      html = `<div class="badge gap">reasoning unavailable</div><div class="gap-note">Transcript window could not be read at capture time. This is recorded honestly rather than faked.</div>`;
    } else {
      html = `<div class="badge ok">captured live before compaction</div>${escapeHtml(ev.reasoning_text || "(none)")}`;
    }
  } else if (state.tab === "context") {
    html = `session   ${ev.session_id}\nbranch    ${ev.git_branch || "-"}\nhead      ${ev.git_head || "-"}\ndirty     ${ev.git_dirty ? "yes" : "no"}\nphase     ${ev.phase}\nrisk      ${ev.risk}${ev.risk_reasons && ev.risk_reasons.length ? "  (" + ev.risk_reasons.join(", ") + ")" : ""}`;
  } else if (state.tab === "result") {
    let res = ev.result_json;
    try { res = JSON.stringify(JSON.parse(ev.result_json), null, 2); } catch {}
    html = escapeHtml(res || "(no result yet)");
  }
  drawerBody.innerHTML = html;
}

document.querySelectorAll(".drawer-tabs button").forEach(b => {
  b.addEventListener("click", () => { state.tab = b.dataset.tab; renderDrawer(); });
});

pausePill.addEventListener("click", () => { state.paused = false; pausePill.classList.remove("show"); render(); });
timelineEl.addEventListener("scroll", () => {
  if (timelineEl.scrollTop > 40 && !state.paused) { state.paused = true; }
  if (state.paused) pausePill.classList.add("show");
});

// session sidebar
async function loadSessions() {
  const res = await fetch("/api/sessions");
  const sessions = await res.json();
  const list = document.getElementById("session-list");
  list.innerHTML = sessions.map(s => `<div class="session-item" data-session="${s.id}">
    ${s.id.slice(0,8)} · ${s.event_count} evt${s.last_event_ts ? " · " + fmtTime(s.last_event_ts) : ""}
  </div>`).join("");
  document.querySelectorAll(".session-item").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".session-item").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      state.sessionFilter = el.dataset.session;
      render();
    });
  });
}

document.querySelectorAll("#filters input").forEach(cb => {
  cb.addEventListener("change", () => {
    if (cb.checked) state.riskFilter.add(cb.value); else state.riskFilter.delete(cb.value);
    render();
  });
});

// search
const searchEl = document.getElementById("search");
let searchDebounce;
searchEl.addEventListener("input", () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(runSearch, 250);
});
searchEl.addEventListener("keydown", e => { if (e.key === "Escape") { searchEl.value = ""; state.searchMode = false; runSearch(); searchEl.blur(); } });

async function runSearch() {
  const q = searchEl.value.trim();
  if (!q) { state.searchMode = false; return; }
  state.searchMode = true;
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  state.events = await res.json();
  render();
}

// keyboard nav
document.addEventListener("keydown", e => {
  if (document.activeElement === searchEl) return;
  if (e.key === "/") { e.preventDefault(); searchEl.focus(); return; }
  const rows = Array.from(timelineEl.querySelectorAll(".row"));
  if (!rows.length) return;
  let idx = state.selected ? rows.findIndex(r => parseInt(r.dataset.id) === state.selected.id) : -1;
  if (e.key === "j") { idx = Math.min(idx + 1, rows.length - 1); selectEvent(parseInt(rows[idx].dataset.id)); }
  if (e.key === "k") { idx = Math.max(idx - 1, 0); selectEvent(parseInt(rows[idx].dataset.id)); }
});

// live SSE
function connectStream() {
  const es = new EventSource("/api/stream");
  es.onmessage = (msg) => {
    recIndicator.classList.remove("idle"); recIndicator.classList.add("live");
    if (state.searchMode) return;
    const ev = JSON.parse(msg.data);
    const existingIdx = state.events.findIndex(e => e.id === ev.id);
    if (existingIdx >= 0) state.events[existingIdx] = ev; else state.events.push(ev);
    if (!state.paused) render();
  };
  es.onerror = () => { recIndicator.classList.add("idle"); recIndicator.classList.remove("live"); };
}

async function init() {
  await loadSessions();
  connectStream();
  setInterval(loadSessions, 5000);
}
init();
</script>
</body>
</html>
